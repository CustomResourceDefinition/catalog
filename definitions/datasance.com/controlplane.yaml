apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: controlplanes.datasance.com
spec:
  group: datasance.com
  names:
    kind: ControlPlane
    listKind: ControlPlaneList
    plural: controlplanes
    singular: controlplane
  scope: Namespaced
  versions:
  - name: v3
    schema:
      openAPIV3Schema:
        description: ControlPlane is the Schema for the controlplanes API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ControlPlaneSpec defines the desired state of ControlPlane.
            properties:
              auth:
                description: |-
                  INSERT ADDITIONAL SPEC FIELDS - desired state of cluster
                  Important: Run "operator-sdk generate k8s" to regenerate code after modifying this file
                  Add custom validation using kubebuilder tags: https://book-v1.book.kubebuilder.io/beyond_basics/generating_crd.html
                  Auth configures OIDC for the Controller (embedded or external IdP).
                properties:
                  bootstrap:
                    description: Bootstrap admin credentials; required when mode=embedded.
                    properties:
                      password:
                        type: string
                      passwordSecretRef:
                        description: PasswordSecretRef references a Secret containing
                          the bootstrap password.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      username:
                        type: string
                    type: object
                  client:
                    description: Client OAuth2 credentials for the Controller API.
                    properties:
                      id:
                        type: string
                      secret:
                        type: string
                    type: object
                  consoleClient:
                    description: ConsoleClient is the OIDC client id for EdgeOps Console
                      (embedded only).
                    type: string
                  consoleClientEnabled:
                    description: ConsoleClientEnabled registers the console OIDC client
                      (embedded only).
                    type: boolean
                  insecureAllowBootstrapLog:
                    description: InsecureAllowBootstrapLog logs bootstrap credentials
                      (dev only).
                    type: boolean
                  insecureAllowHttp:
                    description: InsecureAllowHttp allows HTTP for OIDC endpoints
                      (dev only).
                    type: boolean
                  issuerUrl:
                    description: IssuerUrl is required when mode=external.
                    type: string
                  mode:
                    description: 'Mode is required: embedded (local OIDC) or external
                      (IdP).'
                    enum:
                    - embedded
                    - external
                    type: string
                  oidcTtl:
                    description: OidcTtl configures OIDC interaction/grant/session
                      TTLs (embedded only).
                    properties:
                      grantTtlSeconds:
                        type: integer
                      idTokenTtlSeconds:
                        type: integer
                      interactionTtlSeconds:
                        type: integer
                      sessionTtlSeconds:
                        type: integer
                    type: object
                  rateLimit:
                    description: RateLimit configures auth rate limiting (embedded
                      only).
                    properties:
                      enabled:
                        type: boolean
                      maxRequestsPerWindow:
                        type: integer
                      windowMs:
                        type: integer
                    type: object
                  sessionStore:
                    description: SessionStore configures session storage (embedded
                      only).
                    properties:
                      secret:
                        type: string
                      ttlMs:
                        type: integer
                      type:
                        type: string
                    type: object
                  tokenTtl:
                    description: TokenTtl configures access/refresh token TTLs (embedded
                      only).
                    properties:
                      accessTokenTtlSeconds:
                        type: integer
                      refreshTokenTtlSeconds:
                        type: integer
                    type: object
                required:
                - mode
                type: object
              controller:
                description: Controller contains runtime configuration for ioFog Controller
                properties:
                  consolePort:
                    type: integer
                  consoleUrl:
                    type: string
                  ecn:
                    type: string
                  https:
                    type: boolean
                  logLevel:
                    type: string
                  pidBaseDir:
                    type: string
                  publicUrl:
                    type: string
                  secretName:
                    type: string
                  trustProxy:
                    type: boolean
                type: object
              database:
                description: Database for ioFog Controller
                properties:
                  ca:
                    type: string
                  databaseName:
                    type: string
                  host:
                    type: string
                  password:
                    type: string
                  port:
                    type: integer
                  provider:
                    type: string
                  ssl:
                    type: boolean
                  user:
                    type: string
                required:
                - databaseName
                - host
                - password
                - port
                - provider
                - user
                type: object
              events:
                description: |-
                  // Router contains runtime configuration for ioFog Router
                  Router Router `json:"router,omitempty"`
                  Events contains runtime configuration for ioFog Controller events
                properties:
                  auditEnabled:
                    type: boolean
                  captureIpAddress:
                    type: boolean
                  cleanupInterval:
                    type: integer
                  retentionDays:
                    type: integer
                type: object
              images:
                description: Images specifies which containers to run for each component
                  of the ControlPlane
                properties:
                  controller:
                    type: string
                  nats:
                    type: string
                  pullSecret:
                    type: string
                  router:
                    type: string
                type: object
              ingresses:
                description: Ingresses allow Router and Port Manager to configure
                  endpoint addresses correctly
                properties:
                  controller:
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      host:
                        type: string
                      ingressClassName:
                        type: string
                      secretName:
                        type: string
                    type: object
                  nats:
                    description: |-
                      NatsIngress specifies the external address and ports for NATS hub registration (required when using ingress).
                      Ports are optional and default to: server 4222, cluster 6222, leaf 7422, mqtt 8883, http 8222.
                    properties:
                      address:
                        type: string
                      clusterPort:
                        type: integer
                      httpPort:
                        type: integer
                      leafPort:
                        type: integer
                      mqttPort:
                        type: integer
                      serverPort:
                        type: integer
                    type: object
                  router:
                    properties:
                      address:
                        type: string
                      edgePort:
                        type: integer
                      interiorPort:
                        type: integer
                      messagePort:
                        type: integer
                    type: object
                type: object
              nats:
                description: Nats contains NATS hub configuration (StatefulSet, JetStream,
                  etc.). When omitted, NATS is enabled with defaults.
                properties:
                  enabled:
                    description: Enabled toggles NATS deployment. When omitted, treated
                      as true.
                    type: boolean
                  jetStream:
                    description: JetStream storage and memory limits.
                    properties:
                      memoryStoreSize:
                        description: MemoryStoreSize is used for max_memory_store
                          in server.conf only (default 1Gi).
                        type: string
                      storageClassName:
                        description: StorageClassName for the JetStream PVC (optional).
                        type: string
                      storageSize:
                        description: StorageSize is used for the PVC size and max_file_store
                          in server.conf (default 10Gi).
                        type: string
                    type: object
                type: object
              replicas:
                description: Replicas of ioFog Controller should be 1 unless an external
                  DB is configured
                properties:
                  controller:
                    format: int32
                    type: integer
                  nats:
                    description: Nats is the number of NATS server replicas (default
                      2, min 2 when NATS enabled).
                    format: int32
                    minimum: 2
                    type: integer
                type: object
              services:
                description: Services should be LoadBalancer unless Ingress is being
                  configured
                properties:
                  controller:
                    properties:
                      address:
                        type: string
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      externalTrafficPolicy:
                        description: 'ExternalTrafficPolicy for LoadBalancer/NodePort:
                          "Local" or "Cluster". When omitted, LoadBalancer defaults
                          to Local, others to Cluster. Use "Cluster" on local K8s
                          (e.g. OrbStack) if Local causes issues.'
                        type: string
                      type:
                        type: string
                    type: object
                  nats:
                    properties:
                      address:
                        type: string
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      externalTrafficPolicy:
                        description: 'ExternalTrafficPolicy for LoadBalancer/NodePort:
                          "Local" or "Cluster". When omitted, LoadBalancer defaults
                          to Local, others to Cluster. Use "Cluster" on local K8s
                          (e.g. OrbStack) if Local causes issues.'
                        type: string
                      type:
                        type: string
                    type: object
                  natsServer:
                    properties:
                      address:
                        type: string
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      externalTrafficPolicy:
                        description: 'ExternalTrafficPolicy for LoadBalancer/NodePort:
                          "Local" or "Cluster". When omitted, LoadBalancer defaults
                          to Local, others to Cluster. Use "Cluster" on local K8s
                          (e.g. OrbStack) if Local causes issues.'
                        type: string
                      type:
                        type: string
                    type: object
                  router:
                    properties:
                      address:
                        type: string
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      externalTrafficPolicy:
                        description: 'ExternalTrafficPolicy for LoadBalancer/NodePort:
                          "Local" or "Cluster". When omitted, LoadBalancer defaults
                          to Local, others to Cluster. Use "Cluster" on local K8s
                          (e.g. OrbStack) if Local causes issues.'
                        type: string
                      type:
                        type: string
                    type: object
                type: object
              vault:
                description: Vault is optional. When set, the Controller uses the
                  configured vault provider for secrets. Operator creates a Secret
                  from provider-specific config and injects env vars.
                properties:
                  aws:
                    description: Aws provider config. Set when provider is aws or
                      aws-secrets-manager.
                    properties:
                      accessKey:
                        type: string
                      accessKeyId:
                        type: string
                      region:
                        type: string
                    type: object
                  azure:
                    description: Azure provider config. Set when provider is azure
                      or azure-key-vault.
                    properties:
                      clientId:
                        type: string
                      clientSecret:
                        type: string
                      tenantId:
                        type: string
                      url:
                        type: string
                    type: object
                  basePath:
                    description: BasePath for secrets in vault; $namespace is replaced
                      with the ControlPlane namespace (e.g. iofog/$namespace/secrets).
                    type: string
                  enabled:
                    type: boolean
                  google:
                    description: Google provider config. Set when provider is google
                      or google-secret-manager.
                    properties:
                      credentials:
                        type: string
                      projectId:
                        type: string
                    type: object
                  hashicorp:
                    description: Hashicorp (and openbao/vault) provider config. Set
                      when provider is hashicorp, openbao, or vault.
                    properties:
                      address:
                        type: string
                      mount:
                        type: string
                      token:
                        type: string
                    type: object
                  provider:
                    description: 'Provider: hashicorp, openbao, vault, aws, aws-secrets-manager,
                      azure, azure-key-vault, google, google-secret-manager.'
                    type: string
                type: object
            required:
            - auth
            - database
            type: object
          status:
            description: ControlPlaneStatus defines the observed state of ControlPlane.
            properties:
              conditions:
                description: |-
                  INSERT ADDITIONAL STATUS FIELD - define observed state of cluster
                  Important: Run "make" to regenerate code after modifying this file
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            required:
            - conditions
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
