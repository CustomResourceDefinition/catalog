apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    cert-manager.io/inject-ca-from: cert-manager-test/selfsigned-cert
    controller-gen.kubebuilder.io/version: v0.18.0
  name: databases.ndb.nutanix.com
spec:
  conversion:
    strategy: Webhook
    webhook:
      clientConfig:
        service:
          name: webhook-service
          namespace: system
          path: /convert
      conversionReviewVersions:
      - v1
  group: ndb.nutanix.com
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    shortNames:
    - db
    - dbs
    singular: database
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ipAddress
      name: IP Address
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .status.type
      name: Type
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Database is the Schema for the databases API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseSpec defines the desired state of Database
            properties:
              clone:
                properties:
                  additionalArguments:
                    additionalProperties:
                      type: string
                    description: Additional database engine specific arguments
                    type: object
                  clusterId:
                    description: |-
                      Id of the cluster to clone the database on
                      Either clusterId or clusterName must be provided
                    type: string
                  clusterName:
                    description: |-
                      Name of the cluster to clone the database on
                      Either clusterId or clusterName must be provided
                    type: string
                  credentialSecret:
                    description: Name of the secret holding the credentials for the
                      database instance (password and ssh key)
                    type: string
                  description:
                    description: Description of the clone instance
                    type: string
                  name:
                    description: Name of the clone instance
                    type: string
                  profiles:
                    properties:
                      compute:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      dbParam:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      dbParamInstance:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      network:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      software:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                    type: object
                  snapshotId:
                    description: |-
                      Id of the snapshot to create a clone from
                      Either snapshotId or snapshotName must be provided
                    type: string
                  snapshotName:
                    description: |-
                      Name of the snapshot to create a clone from
                      Either snapshotId or snapshotName must be provided
                    type: string
                  sourceDatabaseId:
                    description: |-
                      Id of the source database on NDB to clone from
                      Either sourceDatabaseId or sourceDatabaseName must be provided
                    type: string
                  sourceDatabaseName:
                    description: |-
                      Name of the source database on NDB to clone from
                      Either sourceDatabaseId or sourceDatabaseName must be provided
                    type: string
                  timezone:
                    description: default UTC
                    type: string
                  type:
                    description: Type of parent clone
                    type: string
                required:
                - credentialSecret
                - name
                - type
                type: object
              databaseInstance:
                description: Database instance specific details
                properties:
                  additionalArguments:
                    additionalProperties:
                      type: string
                    description: Additional database engine specific arguments
                    type: object
                  clusterId:
                    description: |-
                      Id of the cluster to provision the database on
                      Either clusterId or clusterName must be provided
                    type: string
                  clusterName:
                    description: |-
                      Name of the cluster to provision the database on
                      Either clusterId or clusterName must be provided
                    type: string
                  credentialSecret:
                    description: Name of the secret holding the credentials for the
                      database instance (password and ssh key)
                    type: string
                  databaseNames:
                    description: |-
                      Name(s) of the database(s) to be provisioned inside the database instance
                      default [ "database_one", "database_two", "database_three" ]
                    items:
                      type: string
                    type: array
                  description:
                    description: Description of the database instance
                    type: string
                  haConfig:
                    description: |-
                      HA configuration for Postgres HA instances (multi-cluster topology).
                      When set, provisions a clustered Postgres instance with HAProxy and Patroni.
                    properties:
                      clusterName:
                        description: Display name for the NDB HA cluster
                        type: string
                      enableSynchronousMode:
                        description: Enable synchronous replication mode
                        type: boolean
                      nodes:
                        description: Node placement and role definitions for all VMs
                          in the HA cluster
                        items:
                          description: InstanceHANode describes the placement and
                            role of a single VM in an HA cluster.
                          properties:
                            clusterId:
                              description: |-
                                Id of the PE cluster this node should be placed on.
                                Either clusterId or clusterName must be provided.
                              type: string
                            clusterName:
                              description: |-
                                Name of the PE cluster this node should be placed on.
                                Either clusterId or clusterName must be provided.
                              type: string
                            failoverMode:
                              description: Failover mode for database nodes (default
                                "Automatic")
                              type: string
                            nodeType:
                              description: 'Type of this node: "haproxy" or "database"'
                              enum:
                              - haproxy
                              - database
                              type: string
                            role:
                              description: 'Role of this node (database nodes only):
                                "Primary" or "Secondary"'
                              type: string
                            vmName:
                              description: Name of the VM to be created
                              type: string
                          required:
                          - nodeType
                          - vmName
                          type: object
                        type: array
                      postgres:
                        description: |-
                          Postgres contains Patroni and HAProxy settings specific to Postgres HA.
                          Required when the database type is "postgres".
                        properties:
                          patroniClusterName:
                            description: Name used by Patroni for DCS cluster coordination
                            type: string
                          provisionVirtualIP:
                            description: |-
                              ProvisionVirtualIP controls whether NDB provisions a Virtual IP for the HAProxy layer.
                              Set to true only when all HAProxy VMs are on the same Nutanix cluster (non-stretched VLAN).
                              Defaults to false; use false when HAProxy nodes span multiple PE clusters.
                            type: boolean
                          readPort:
                            default: 5001
                            description: HAProxy read (replica) port. Defaults to
                              5001.
                            format: int32
                            type: integer
                          writePort:
                            default: 5000
                            description: HAProxy write (primary) port. Defaults to
                              5000.
                            format: int32
                            type: integer
                        required:
                        - patroniClusterName
                        type: object
                    required:
                    - clusterName
                    - nodes
                    type: object
                  name:
                    description: Name of the database instance
                    type: string
                  profiles:
                    properties:
                      compute:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      dbParam:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      dbParamInstance:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      network:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                      software:
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                        type: object
                    type: object
                  size:
                    description: Size of the database instance, minimum 10 (GBs)
                    type: integer
                  timeMachine:
                    description: Information related to time machine that is to be
                      associated with this database
                    properties:
                      dailySnapshotTime:
                        description: Daily snapshot time in HH:MM:SS (24 hour format)
                        type: string
                      description:
                        type: string
                      logCatchUpFrequency:
                        description: Log catch up frequency in minutes
                        type: integer
                      monthlySnapshotDay:
                        description: Day of the month for monthly snapshot
                        type: integer
                      name:
                        type: string
                      quarterlySnapshotMonth:
                        description: |-
                          Start month for the quarterly snapshot
                          Jan => Jan, Apr, Jul, Oct.
                          Feb => Feb, May, Aug, Nov.
                          Mar => Mar, Jun, Sep, Dec.
                        type: string
                      sla:
                        description: Name of the SLA to be used, default NONE
                        type: string
                      snapshotsPerDay:
                        description: Number of snapshots per day
                        type: integer
                      weeklySnapshotDay:
                        description: Day of the week for weekly snapshot
                        type: string
                    type: object
                  timezone:
                    description: default UTC
                    type: string
                  type:
                    type: string
                required:
                - credentialSecret
                - name
                - size
                - type
                type: object
              defaultsConfigMapRef:
                description: |-
                  DefaultsConfigMapRef references a ConfigMap containing default values
                  for database configuration. Values explicitly set in this spec take
                  precedence over ConfigMap defaults. The ConfigMap should be in the same
                  namespace as the Database resource.
                type: string
              isClone:
                type: boolean
              ndbRef:
                type: string
            required:
            - ndbRef
            type: object
          status:
            description: DatabaseStatus defines the observed state of Database
            properties:
              creationOperationId:
                type: string
              dbServerDeletionOperationIds:
                description: |-
                  DBServerDeletionOperationIds holds the NDB operation ID returned by the DPC (DBServerCluster) deletion.
                  Populated when HA deletion starts; polled until the operation completes before the finalizer is removed.
                items:
                  type: string
                type: array
              dbServerId:
                type: string
              deregistrationOperationId:
                type: string
              id:
                type: string
              ipAddress:
                type: string
              status:
                type: string
              type:
                type: string
            required:
            - creationOperationId
            - dbServerId
            - deregistrationOperationId
            - id
            - ipAddress
            - status
            - type
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
