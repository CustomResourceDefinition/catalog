apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: imagescans.fleet.cattle.io
spec:
  group: fleet.cattle.io
  names:
    kind: ImageScan
    listKind: ImageScanList
    plural: imagescans
    singular: imagescan
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.image
          name: Repository
          type: string
        - jsonPath: .status.latestTag
          name: Latest
          type: string
      name: v1alpha1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              description: 'APIVersion defines the versioned schema of this representation
                of an object.

                Servers should convert recognized schemas to the latest internal value,
                and

                may reject unrecognized values.

                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
              type: string
            kind:
              description: 'Kind is a string value representing the REST resource
                this object represents.

                Servers may infer this from the endpoint the client submits requests
                to.

                Cannot be updated.

                In CamelCase.

                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
              type: string
            metadata:
              type: object
            spec:
              description: API is taken from https://github.com/fluxcd/image-reflector-controller
              properties:
                gitrepoName:
                  description: GitRepo reference name
                  nullable: true
                  type: string
                image:
                  description: Image is the name of the image repository
                  nullable: true
                  type: string
                interval:
                  description: 'Interval is the length of time to wait between

                    scans of the image repository.'
                  nullable: true
                  type: string
                policy:
                  description: 'Policy gives the particulars of the policy to be followed
                    in

                    selecting the most recent image'
                  properties:
                    alphabetical:
                      description: Alphabetical set of rules to use for alphabetical
                        ordering of the tags.
                      nullable: true
                      properties:
                        order:
                          description: 'Order specifies the sorting order of the tags.
                            Given the letters of the

                            alphabet as tags, ascending order would select Z, and
                            descending order

                            would select A.'
                          nullable: true
                          type: string
                      type: object
                    semver:
                      description: 'SemVer gives a semantic version range to check
                        against the tags

                        available.'
                      nullable: true
                      properties:
                        range:
                          description: 'Range gives a semver range for the image tag;
                            the highest

                            version within the range that''s a tag yields the latest
                            image.'
                          nullable: true
                          type: string
                      type: object
                  type: object
                secretRef:
                  description: 'SecretRef can be given the name of a secret containing

                    credentials to use for the image registry. The secret should be

                    created with `kubectl create secret docker-registry`, or the

                    equivalent.'
                  nullable: true
                  properties:
                    name:
                      default: ''
                      description: 'Name of the referent.

                        This field is effectively required, but due to backwards compatibility
                        is

                        allowed to be empty. Instances of this type with an empty
                        value here are

                        almost certainly wrong.

                        More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names'
                      type: string
                  type: object
                  x-kubernetes-map-type: atomic
                suspend:
                  description: 'This flag tells the controller to suspend subsequent
                    image scans.

                    It does not apply to already started scans. Defaults to false.'
                  type: boolean
                tagName:
                  description: TagName is the tag ref that needs to be put in manifest
                    to replace fields
                  nullable: true
                  type: string
              required:
                - image
                - interval
              type: object
            status:
              properties:
                canonicalImageName:
                  description: 'CanonicalName is the name of the image repository
                    with all the

                    implied bits made explicit; e.g., `docker.io/library/alpine`

                    rather than `alpine`.'
                  type: string
                conditions:
                  items:
                    properties:
                      lastTransitionTime:
                        description: Last time the condition transitioned from one
                          status to another.
                        type: string
                      lastUpdateTime:
                        description: The last time this condition was updated.
                        type: string
                      message:
                        description: Human-readable message indicating details about
                          last transition
                        type: string
                      reason:
                        description: The reason for the condition's last transition.
                        type: string
                      status:
                        description: Status of the condition, one of True, False,
                          Unknown.
                        type: string
                      type:
                        description: Type of cluster condition.
                        type: string
                    required:
                      - status
                      - type
                    type: object
                  type: array
                lastScanTime:
                  description: LastScanTime is the last time image was scanned
                  format: date-time
                  type: string
                latestDigest:
                  description: LatestDigest is the digest of latest tag
                  type: string
                latestImage:
                  description: 'LatestImage gives the first in the list of images
                    scanned by

                    the image repository, when filtered and ordered according to

                    the policy.'
                  type: string
                latestTag:
                  description: Latest tag is the latest tag filtered by the policy
                  type: string
                observedGeneration:
                  format: int64
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}
