---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  labels:
    gateway.networking.k8s.io/policy: inherited
  name: wafpolicies.gateway.nginx.org
spec:
  group: gateway.nginx.org
  names:
    categories:
    - nginx-gateway-fabric
    kind: WAFPolicy
    listKind: WAFPolicyList
    plural: wafpolicies
    shortNames:
    - wgbpolicy
    singular: wafpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WAFPolicy is an Inherited Attached Policy. It provides a way to configure F5 WAF for NGINX
          for Gateways and Routes by referencing compiled WAF policy bundles. Bundles can be fetched directly from an
          HTTP/HTTPS URL (type: HTTP), from an NGINX Instance Manager instance (type: NIM), or from an F5 NGINX One
          Console instance (type: N1C).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired state of the WAFPolicy.
            properties:
              policySource:
                description: PolicySource holds all policy bundle fetch configuration.
                properties:
                  auth:
                    description: Auth configures authentication credentials for fetching
                      the bundle.
                    properties:
                      secretRef:
                        description: |-
                          SecretRef references a Kubernetes Secret in the same namespace as the WAFPolicy.
                          The Secret may contain:
                            - "username" and "password" fields for HTTP Basic Authentication
                            - "token" field for Bearer Token Authentication (NIM) or APIToken Authentication (N1C)
                        properties:
                          name:
                            description: Name is the name of the referenced object.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - secretRef
                    type: object
                  httpSource:
                    description: |-
                      HTTPSource configures direct bundle fetching from an HTTP/HTTPS URL.
                      Required when type is HTTP; must not be set for other types.
                    properties:
                      url:
                        description: |-
                          URL is the full URL of the compiled policy bundle (.tgz),
                          e.g. "https://storage.example.com/bundles/policy.tgz".
                        maxLength: 2083
                        minLength: 1
                        pattern: ^https?://
                        type: string
                    required:
                    - url
                    type: object
                  insecureSkipVerify:
                    description: |-
                      InsecureSkipVerify disables TLS certificate verification when fetching the bundle.
                      Not recommended for production use.
                    type: boolean
                  n1cSource:
                    description: |-
                      N1CSource configures bundle fetching from F5 NGINX One Console.
                      Required when type is N1C; must not be set for other types.
                    properties:
                      namespace:
                        description: Namespace is the NGINX One Console namespace
                          that owns the security policy.
                        maxLength: 253
                        minLength: 1
                        type: string
                      policyName:
                        description: |-
                          PolicyName is the name of the security policy in N1C.
                          Mutually exclusive with policyObjectID.
                        maxLength: 253
                        minLength: 1
                        type: string
                      policyObjectID:
                        description: |-
                          PolicyObjectID is the unique object identifier of the security policy in N1C
                          (e.g. "pol_-IUuEUN7ST63oRC7AlQPLw").
                          Mutually exclusive with policyName.
                        pattern: ^pol_[A-Za-z0-9_-]+$
                        type: string
                      policyVersionID:
                        description: |-
                          PolicyVersionID pins a specific version of the policy bundle using its opaque version ID
                          (e.g. "pv_UJ2gL5fOQ3Gnb3OVuVo1XA"). When omitted, the latest available version is used.
                        pattern: ^pv_[A-Za-z0-9_-]+$
                        type: string
                      url:
                        description: |-
                          URL is the base URL of the F5 NGINX One Console instance,
                          e.g. "https://<tenant>.volterra.us".
                        maxLength: 2083
                        minLength: 1
                        pattern: ^https?://
                        type: string
                    required:
                    - namespace
                    - url
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of policyName or policyObjectID must be
                        set
                      rule: (has(self.policyName) && !has(self.policyObjectID)) ||
                        (!has(self.policyName) && has(self.policyObjectID))
                  nimSource:
                    description: |-
                      NIMSource configures bundle fetching from NGINX Instance Manager.
                      Required when type is NIM; must not be set for other types.
                    properties:
                      policyName:
                        description: |-
                          PolicyName is the name of the compiled policy bundle in NIM.
                          Mutually exclusive with policyUID.
                        maxLength: 253
                        minLength: 1
                        type: string
                      policyUID:
                        description: |-
                          PolicyUID is the unique identifier of the compiled policy bundle in NIM.
                          Mutually exclusive with policyName.
                          Must be a valid UUID (e.g. "2bc1e3ac-7990-4ca4-910a-8634c444c804").
                        pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
                        type: string
                      url:
                        description: |-
                          URL is the base URL of the NGINX Instance Manager instance,
                          e.g. "https://nim.example.com".
                        maxLength: 2083
                        minLength: 1
                        pattern: ^https?://
                        type: string
                    required:
                    - url
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of policyName or policyUID must be set
                      rule: (has(self.policyName) && !has(self.policyUID)) || (!has(self.policyName)
                        && has(self.policyUID))
                  polling:
                    description: Polling configures automatic periodic re-fetching
                      of the bundle.
                    properties:
                      enabled:
                        description: |-
                          Enabled activates periodic re-fetching of the bundle.
                          When true, NGF fetches the bundle on each interval and deploys it only if
                          its checksum differs from the last successfully fetched version.
                        type: boolean
                      interval:
                        description: |-
                          Interval is the period between poll cycles.
                          Defaults to 5m when polling is enabled but no interval is set.
                        type: string
                    type: object
                  retryAttempts:
                    default: 3
                    description: |-
                      RetryAttempts is the maximum number of additional fetch attempts on transient failures
                      (network errors, HTTP 5xx). Set to 0 to disable retries. Defaults to 3.
                      Non-transient errors (HTTP 4xx, checksum mismatch) are never retried.
                    format: int32
                    maximum: 10
                    minimum: 0
                    type: integer
                  timeout:
                    description: |-
                      Timeout is the maximum duration for a single bundle fetch attempt.
                      Defaults to 30s when not set.
                    type: string
                  tlsSecret:
                    description: |-
                      TLSSecretRef references a Secret containing a custom CA certificate (key: "ca.crt") for
                      verifying the bundle server's TLS certificate.
                    properties:
                      name:
                        description: Name is the name of the referenced object.
                        type: string
                    required:
                    - name
                    type: object
                  validation:
                    description: Validation configures integrity verification for
                      the downloaded bundle.
                    properties:
                      expectedChecksum:
                        description: |-
                          ExpectedChecksum is the expected SHA256 checksum of the bundle.
                          If set, the downloaded bundle must match this checksum or it will be rejected.
                          For N1C sources, the checksum reported by the N1C API is verified automatically;
                          set this field only if you want to enforce an additional, independently known value.
                        maxLength: 64
                        minLength: 64
                        pattern: ^[0-9a-fA-F]{64}$
                        type: string
                      verifyChecksum:
                        description: |-
                          VerifyChecksum enables automatic checksum verification by fetching a companion
                          checksum file at <url>.sha256 and comparing it against the downloaded bundle.
                          Only supported when the policy source type is HTTP (policySource.httpSource or
                          logSource.url); setting this for NIM or N1C sources is rejected at admission.
                          Note: for N1C sources, bundle integrity is always verified automatically using
                          the checksum returned by the N1C compile API — this field is not needed.
                          Mutually exclusive with expectedChecksum.
                        type: boolean
                    type: object
                    x-kubernetes-validations:
                    - message: verifyChecksum and expectedChecksum are mutually exclusive
                      rule: '!(has(self.verifyChecksum) && self.verifyChecksum &&
                        has(self.expectedChecksum))'
                type: object
              securityLogs:
                description: SecurityLogs defines security logging configurations.
                items:
                  description: |-
                    WAFSecurityLog defines security logging configuration for app_protect_security_log directives.
                    Exactly one of logSource.defaultProfile, logSource.httpSource, logSource.nimSource, or logSource.n1cSource must be set.
                  properties:
                    destination:
                      description: Destination defines where security logs are sent.
                      properties:
                        file:
                          description: |-
                            File defines the file destination configuration.
                            Only valid when type is "file".
                          properties:
                            path:
                              description: |-
                                Path is the file path where security logs will be written.
                                Must be accessible to the waf-enforcer container.
                              maxLength: 256
                              minLength: 1
                              pattern: ^/.*$
                              type: string
                          required:
                          - path
                          type: object
                        syslog:
                          description: |-
                            Syslog defines the syslog destination configuration.
                            Only valid when type is "syslog".
                          properties:
                            server:
                              description: Server is the syslog server address in
                                the format "host:port".
                              maxLength: 253
                              minLength: 1
                              pattern: ^[a-zA-Z0-9.-]+:[0-9]+$
                              type: string
                          required:
                          - server
                          type: object
                        type:
                          default: stderr
                          description: Type identifies the type of security log destination.
                          enum:
                          - stderr
                          - file
                          - syslog
                          type: string
                      required:
                      - type
                      type: object
                      x-kubernetes-validations:
                      - message: destination.file must be set if and only if type
                          is file
                        rule: (self.type == 'file') == has(self.file)
                      - message: destination.syslog must be set if and only if type
                          is syslog
                        rule: (self.type == 'syslog') == has(self.syslog)
                    logSource:
                      description: |-
                        LogSource configures the log profile bundle source for this log entry.
                        Exactly one of url or defaultProfile must be set.
                      properties:
                        auth:
                          description: |-
                            Auth configures authentication credentials for fetching the log bundle.
                            Only applicable when url is set.
                          properties:
                            secretRef:
                              description: |-
                                SecretRef references a Kubernetes Secret in the same namespace as the WAFPolicy.
                                The Secret may contain:
                                  - "username" and "password" fields for HTTP Basic Authentication
                                  - "token" field for Bearer Token Authentication (NIM) or APIToken Authentication (N1C)
                              properties:
                                name:
                                  description: Name is the name of the referenced
                                    object.
                                  type: string
                              required:
                              - name
                              type: object
                          required:
                          - secretRef
                          type: object
                        defaultProfile:
                          description: |-
                            DefaultProfile selects one of the built-in WAF log profile bundles shipped with the WAF engine.
                            Mutually exclusive with HTTPSource, NIMSource, and N1CSource.
                          enum:
                          - log_default
                          - log_all
                          - log_illegal
                          - log_blocked
                          - log_grpc_all
                          - log_grpc_blocked
                          - log_grpc_illegal
                          type: string
                        httpSource:
                          description: |-
                            HTTPSource configures direct bundle fetching from an HTTP/HTTPS URL.
                            Mutually exclusive with DefaultProfile, NIMSource and N1CSource.
                          properties:
                            url:
                              description: |-
                                URL is the full URL of the compiled policy bundle (.tgz),
                                e.g. "https://storage.example.com/bundles/policy.tgz".
                              maxLength: 2083
                              minLength: 1
                              pattern: ^https?://
                              type: string
                          required:
                          - url
                          type: object
                        insecureSkipVerify:
                          description: |-
                            InsecureSkipVerify disables TLS certificate verification when fetching the bundle.
                            Not recommended for production use.
                          type: boolean
                        n1cSource:
                          description: |-
                            N1CSource configures bundle fetching from F5 NGINX One Console.
                            Mutually exclusive with DefaultProfile, HTTPSource, and NIMSource.
                          properties:
                            namespace:
                              description: Namespace is the NGINX One Console namespace
                                that owns the log profile.
                              maxLength: 253
                              minLength: 1
                              type: string
                            profileName:
                              description: ProfileName is the name of the log profile
                                in N1C that corresponds to the log profile bundle.
                              maxLength: 253
                              minLength: 1
                              type: string
                            profileObjectID:
                              description: |-
                                ProfileObjectID is the unique object identifier of the log profile in N1C
                                (e.g. "lp_8s8uZxLpThWwEGF7LTn_rA") that corresponds to the log profile bundle.
                              pattern: ^lp_[A-Za-z0-9_-]+$
                              type: string
                            url:
                              description: |-
                                URL is the base URL of the F5 NGINX One Console instance,
                                e.g. "https://<tenant>.volterra.us".
                              maxLength: 2083
                              minLength: 1
                              pattern: ^https?://
                              type: string
                          required:
                          - namespace
                          - url
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of profileName or profileObjectID
                              must be set
                            rule: (has(self.profileName) && !has(self.profileObjectID))
                              || (!has(self.profileName) && has(self.profileObjectID))
                        nimSource:
                          description: |-
                            NIMSource configures bundle fetching from NGINX Instance Manager.
                            Mutually exclusive with DefaultProfile, HTTPSource and N1CSource.
                          properties:
                            profileName:
                              description: ProfileName is the name of the compiled
                                log profile bundle in NIM.
                              maxLength: 253
                              minLength: 1
                              type: string
                            url:
                              description: |-
                                URL is the base URL of the NGINX Instance Manager instance,
                                e.g. "https://nim.example.com".
                              maxLength: 2083
                              minLength: 1
                              pattern: ^https?://
                              type: string
                          required:
                          - profileName
                          - url
                          type: object
                        polling:
                          description: |-
                            Polling configures automatic periodic re-fetching of the log bundle.
                            Only applicable when url is set.
                          properties:
                            enabled:
                              description: |-
                                Enabled activates periodic re-fetching of the bundle.
                                When true, NGF fetches the bundle on each interval and deploys it only if
                                its checksum differs from the last successfully fetched version.
                              type: boolean
                            interval:
                              description: |-
                                Interval is the period between poll cycles.
                                Defaults to 5m when polling is enabled but no interval is set.
                              type: string
                          type: object
                        retryAttempts:
                          default: 3
                          description: |-
                            RetryAttempts is the maximum number of additional fetch attempts on transient failures
                            (network errors, HTTP 5xx). Set to 0 to disable retries. Defaults to 3.
                            Non-transient errors (HTTP 4xx, checksum mismatch) are never retried.
                            Only applicable when url is set.
                          format: int32
                          maximum: 10
                          minimum: 0
                          type: integer
                        timeout:
                          description: |-
                            Timeout is the maximum duration for a single log bundle fetch attempt.
                            Defaults to 30s when not set. Only applicable when url is set.
                          type: string
                        tlsSecret:
                          description: |-
                            TLSSecretRef references a Secret containing a custom CA certificate (key: "ca.crt").
                            Only applicable when url is set.
                          properties:
                            name:
                              description: Name is the name of the referenced object.
                              type: string
                          required:
                          - name
                          type: object
                        validation:
                          description: |-
                            Validation configures integrity verification for the downloaded log bundle.
                            Only applicable when url is set.
                          properties:
                            expectedChecksum:
                              description: |-
                                ExpectedChecksum is the expected SHA256 checksum of the bundle.
                                If set, the downloaded bundle must match this checksum or it will be rejected.
                                For N1C sources, the checksum reported by the N1C API is verified automatically;
                                set this field only if you want to enforce an additional, independently known value.
                              maxLength: 64
                              minLength: 64
                              pattern: ^[0-9a-fA-F]{64}$
                              type: string
                            verifyChecksum:
                              description: |-
                                VerifyChecksum enables automatic checksum verification by fetching a companion
                                checksum file at <url>.sha256 and comparing it against the downloaded bundle.
                                Only supported when the policy source type is HTTP (policySource.httpSource or
                                logSource.url); setting this for NIM or N1C sources is rejected at admission.
                                Note: for N1C sources, bundle integrity is always verified automatically using
                                the checksum returned by the N1C compile API — this field is not needed.
                                Mutually exclusive with expectedChecksum.
                              type: boolean
                          type: object
                          x-kubernetes-validations:
                          - message: verifyChecksum and expectedChecksum are mutually
                              exclusive
                            rule: '!(has(self.verifyChecksum) && self.verifyChecksum
                              && has(self.expectedChecksum))'
                      type: object
                      x-kubernetes-validations:
                      - message: exactly one of logSource.defaultProfile, logSource.httpSource,
                          logSource.nimSource, or logSource.n1cSource must be set
                        rule: (has(self.defaultProfile) && !has(self.httpSource) &&
                          !has(self.nimSource) && !has(self.n1cSource)) || (!has(self.defaultProfile)
                          && has(self.httpSource) && !has(self.nimSource) && !has(self.n1cSource))
                          || (!has(self.defaultProfile) && !has(self.httpSource) &&
                          has(self.nimSource) && !has(self.n1cSource)) || (!has(self.defaultProfile)
                          && !has(self.httpSource) && !has(self.nimSource) && has(self.n1cSource))
                  required:
                  - destination
                  - logSource
                  type: object
                maxItems: 32
                type: array
              targetRefs:
                description: |-
                  TargetRefs identifies API object(s) to apply the policy to.
                  Objects must be in the same namespace as the policy.
                  All targets must be of the same Kind (all Gateways OR all HTTPRoutes OR all GRPCRoutes).
                  Support: Gateway, HTTPRoute, GRPCRoute.
                items:
                  description: |-
                    LocalPolicyTargetReference identifies an API object to apply a direct or
                    inherited policy to. This should be used as part of Policy resources
                    that can target Gateway API resources. For more information on how this
                    policy attachment model works, and a sample Policy resource, refer to
                    the policy attachment documentation for Gateway API.
                  properties:
                    group:
                      description: Group is the group of the target resource.
                      maxLength: 253
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      description: Kind is kind of the target resource.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    name:
                      description: Name is the name of the target resource.
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - group
                  - kind
                  - name
                  type: object
                maxItems: 16
                minItems: 1
                type: array
                x-kubernetes-validations:
                - message: All TargetRefs must be the same Kind
                  rule: self.all(t1, self.all(t2, t1.kind == t2.kind))
                - message: 'TargetRef Kind must be one of: Gateway, HTTPRoute, or
                    GRPCRoute'
                  rule: self.all(t, t.kind=='Gateway' || t.kind=='HTTPRoute' || t.kind=='GRPCRoute')
                - message: TargetRef Group must be gateway.networking.k8s.io
                  rule: self.all(t, t.group=='gateway.networking.k8s.io')
                - message: TargetRef Name must be unique
                  rule: self.all(t1, self.exists_one(t2, t1.name == t2.name))
              type:
                description: |-
                  Type identifies the source type for the policy bundle.
                  HTTP fetches directly from a URL; NIM uses the NGINX Instance Manager bundles API;
                  N1C uses the F5 NGINX One Console security policies API.
                enum:
                - HTTP
                - NIM
                - N1C
                type: string
            required:
            - policySource
            - targetRefs
            - type
            type: object
            x-kubernetes-validations:
            - message: policySource.httpSource must be set if and only if type is
                HTTP
              rule: (self.type == 'HTTP') == (has(self.policySource) && has(self.policySource.httpSource))
            - message: policySource.nimSource must be set if and only if type is NIM
              rule: (self.type == 'NIM') == (has(self.policySource) && has(self.policySource.nimSource))
            - message: policySource.n1cSource must be set if and only if type is N1C
              rule: (self.type == 'N1C') == (has(self.policySource) && has(self.policySource.n1cSource))
            - message: policySource.validation.verifyChecksum is only supported for
                type HTTP
              rule: '!(self.type != ''HTTP'' && has(self.policySource) && has(self.policySource.validation)
                && has(self.policySource.validation.verifyChecksum) && self.policySource.validation.verifyChecksum)'
          status:
            description: Status defines the state of the WAFPolicy.
            properties:
              ancestors:
                description: |-
                  Ancestors is a list of ancestor resources (usually Gateways) that are
                  associated with the policy, and the status of the policy with respect to
                  each ancestor. When this policy attaches to a parent, the controller that
                  manages the parent and the ancestors MUST add an entry to this list when
                  the controller first sees the policy and SHOULD update the entry as
                  appropriate when the relevant ancestor is modified.

                  Note that choosing the relevant ancestor is left to the Policy designers;
                  an important part of Policy design is designing the right object level at
                  which to namespace this status.

                  Note also that implementations MUST ONLY populate ancestor status for
                  the Ancestor resources they are responsible for. Implementations MUST
                  use the ControllerName field to uniquely identify the entries in this list
                  that they are responsible for.

                  Note that to achieve this, the list of PolicyAncestorStatus structs
                  MUST be treated as a map with a composite key, made up of the AncestorRef
                  and ControllerName fields combined.

                  A maximum of 16 ancestors will be represented in this list. An empty list
                  means the Policy is not relevant for any ancestors.

                  If this slice is full, implementations MUST NOT add further entries.
                  Instead they MUST consider the policy unimplementable and signal that
                  on any related resources such as the ancestor that would be referenced
                  here. For example, if this list was full on BackendTLSPolicy, no
                  additional Gateways would be able to reference the Service targeted by
                  the BackendTLSPolicy.
                items:
                  description: |-
                    PolicyAncestorStatus describes the status of a route with respect to an
                    associated Ancestor.

                    Ancestors refer to objects that are either the Target of a policy or above it
                    in terms of object hierarchy. For example, if a policy targets a Service, the
                    Policy's Ancestors are, in order, the Service, the HTTPRoute, the Gateway, and
                    the GatewayClass. Almost always, in this hierarchy, the Gateway will be the most
                    useful object to place Policy status on, so we recommend that implementations
                    SHOULD use Gateway as the PolicyAncestorStatus object unless the designers
                    have a _very_ good reason otherwise.

                    In the context of policy attachment, the Ancestor is used to distinguish which
                    resource results in a distinct application of this policy. For example, if a policy
                    targets a Service, it may have a distinct result per attached Gateway.

                    Policies targeting the same resource may have different effects depending on the
                    ancestors of those resources. For example, different Gateways targeting the same
                    Service may have different capabilities, especially if they have different underlying
                    implementations.

                    For example, in BackendTLSPolicy, the Policy attaches to a Service that is
                    used as a backend in a HTTPRoute that is itself attached to a Gateway.
                    In this case, the relevant object for status is the Gateway, and that is the
                    ancestor object referred to in this status.

                    Note that a parent is also an ancestor, so for objects where the parent is the
                    relevant object for status, this struct SHOULD still be used.

                    This struct is intended to be used in a slice that's effectively a map,
                    with a composite key made up of the AncestorRef and the ControllerName.
                  properties:
                    ancestorRef:
                      description: |-
                        AncestorRef corresponds with a ParentRef in the spec that this
                        PolicyAncestorStatus struct describes the status of.
                      properties:
                        group:
                          default: gateway.networking.k8s.io
                          description: |-
                            Group is the group of the referent.
                            When unspecified, "gateway.networking.k8s.io" is inferred.
                            To set the core API group (such as for a "Service" kind referent),
                            Group must be explicitly set to "" (empty string).

                            Support: Core
                          maxLength: 253
                          pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                          type: string
                        kind:
                          default: Gateway
                          description: |-
                            Kind is kind of the referent.

                            There are two kinds of parent resources with "Core" support:

                            * Gateway (Gateway conformance profile)
                            * Service (Mesh conformance profile, ClusterIP Services only)

                            Support for other resources is Implementation-Specific.
                          maxLength: 63
                          minLength: 1
