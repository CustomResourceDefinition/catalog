                            - name
                            x-kubernetes-list-type: map
                        type: object
                      maxItems: 128
                      type: array
                    modelsCreatedAt:
                      description: |-
                        ModelsCreatedAt represents the creation timestamp of the running models serving by the backends,
                        which will be exported as the field of "Created" in openai-compatible API "/models".
