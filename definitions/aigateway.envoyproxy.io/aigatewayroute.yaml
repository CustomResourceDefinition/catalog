apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: aigatewayroutes.aigateway.envoyproxy.io
spec:
  group: aigateway.envoyproxy.io
  names:
    kind: AIGatewayRoute
    listKind: AIGatewayRouteList
    plural: aigatewayroutes
    singular: aigatewayroute
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[-1:].type
      name: Status
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AIGatewayRoute combines multiple AIServiceBackends and attaching them to Gateway(s) resources.

          This serves as a way to define a "unified" AI API for a Gateway which allows downstream
          clients to use a single schema API to interact with multiple AI backends.

          Envoy AI Gateway will generate the following k8s resources corresponding to the AIGatewayRoute:

            - HTTPRoute of the Gateway API as a top-level resource to bind all backends.
              The name of the HTTPRoute is the same as the AIGatewayRoute.
            - HTTPRouteFilter of the Envoy Gateway API per namespace for automatic hostname rewrite.
              The name of the HTTPRouteFilter is `ai-eg-host-rewrite-${AIGatewayRoute.Name}`.

          All of these resources are created in the same namespace as the AIGatewayRoute. Note that this is the implementation
          detail subject to change. If you want to customize the default behavior of the Envoy AI Gateway, you can use these
          resources as a reference and create your own resources. Alternatively, you can use EnvoyPatchPolicy API of the Envoy
          Gateway to patch the generated resources. For example, you can configure the retry fallback behavior by attaching
          BackendTrafficPolicy API of Envoy Gateway to the generated HTTPRoute.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the details of the AIGatewayRoute.
            properties:
              filterConfig:
                description: |-
                  FilterConfig is the configuration for the AI Gateway filter inserted in the generated HTTPRoute.

                  An AI Gateway filter is responsible for the transformation of the request and response
                  as well as the routing behavior based on the model name extracted from the request content, etc.

                  Currently, the filter is only implemented as an external processor filter, which might be
                  extended to other types of filters in the future. See https://github.com/envoyproxy/ai-gateway/issues/90
                properties:
                  externalProcessor:
                    description: |-
                      ExternalProcessor is the configuration for the external processor filter.
                      This is optional, and if not set, the default values of Deployment spec will be used.
                    properties:
                      resources:
                        description: |-
                          Resources required by the external processor container.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/

                          Deprecated: Use GatewayConfig for gateway-scoped resource configuration instead.
                          Configure resources using GatewayConfig.spec.extProc.resources and reference it
                          from the Gateway via the "aigateway.envoyproxy.io/gateway-config" annotation.
                          This field will be removed in a future version.

                          Note: when multiple AIGatewayRoute resources are attached to the same Gateway, and each
                          AIGatewayRoute has a different resource configuration, the ai-gateway will pick one of them
                          to configure the resource requirements of the external processor container.
                        properties:
                          claims:
                            description: |-
                              Claims lists the names of resources, defined in spec.resourceClaims,
                              that are used by this container.

                              This field depends on the
                              DynamicResourceAllocation feature gate.

                              This field is immutable. It can only be set for containers.
                            items:
                              description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                              properties:
                                name:
                                  description: |-
                                    Name must match the name of one entry in pod.spec.resourceClaims of
                                    the Pod where this field is used. It makes that resource available
                                    inside a container.
                                  type: string
                                request:
                                  description: |-
                                    Request is the name chosen for a request in the referenced claim.
                                    If empty, everything from the claim is made available, otherwise
                                    only the result of this request.
                                  type: string
                              required:
                              - name
                              type: object
                            type: array
                            x-kubernetes-list-map-keys:
                            - name
                            x-kubernetes-list-type: map
                          limits:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: |-
                              Limits describes the maximum amount of compute resources allowed.
                              More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                            type: object
                          requests:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            description: |-
                              Requests describes the minimum amount of compute resources required.
                              If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                              otherwise to an implementation-defined value. Requests cannot exceed Limits.
                              More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                            type: object
                        type: object
                    type: object
                  type:
                    default: ExternalProcessor
                    description: |-
                      Type specifies the type of the filter configuration.

                      Currently, only ExternalProcessor is supported, and default is ExternalProcessor.
                    enum:
                    - ExternalProcessor
                    - DynamicModule
                    type: string
                required:
                - type
                type: object
              llmRequestCosts:
                description: "LLMRequestCosts specifies how to capture the cost of
                  the LLM-related request, notably the token usage.\nThe AI Gateway
                  filter will capture each specified number and store it in the Envoy's
                  dynamic\nmetadata per HTTP request. The namespaced key is \"io.envoy.ai_gateway\",\n\nFor
                  example, let's say we have the following LLMRequestCosts configuration:\n```yaml\n\tllmRequestCosts:\n\t-
                  metadataKey: llm_input_token\n\t  type: InputToken\n\t- metadataKey:
                  llm_output_token\n\t  type: OutputToken\n\t- metadataKey: llm_total_token\n\t
                  \ type: TotalToken\n\t- metadataKey: llm_cached_input_token\n\t
                  \ type: CachedInputToken\n- metadataKey: llm_cache_creation_input_token\n
                  \  type: CacheCreationInputToken\n```\nThen, with the following
                  BackendTrafficPolicy of Envoy Gateway, you can have three\nrate
                  limit buckets for each unique x-user-id header value. One bucket
                  is for the input token,\nthe other is for the output token, and
                  the last one is for the total token.\nEach bucket will be reduced
                  by the corresponding token usage captured by the AI Gateway filter.\n\n```yaml\n\tapiVersion:
                  gateway.envoyproxy.io/v1alpha1\n\tkind: BackendTrafficPolicy\n\tmetadata:\n\t
                  \ name: some-example-token-rate-limit\n\t  namespace: default\n\tspec:\n\t
                  \ targetRefs:\n\t  - group: gateway.networking.k8s.io\n\t     kind:
                  HTTPRoute\n\t     name: usage-rate-limit\n\t  rateLimit:\n\t    type:
                  Global\n\t    global:\n\t      rules:\n\t        - clientSelectors:\n\t
                  \           # Do the rate limiting based on the x-user-id header.\n\t
                  \           - headers:\n\t                - name: x-user-id\n\t
                  \                 type: Distinct\n\t          limit:\n\t            #
                  Configures the number of \"tokens\" allowed per hour.\n\t            requests:
                  10000\n\t            unit: Hour\n\t          cost:\n\t            request:\n\t
                  \             from: Number\n\t              # Setting the request
                  cost to zero allows to only check the rate limit budget,\n\t              #
                  and not consume the budget on the request path.\n\t              number:
                  0\n\t            # This specifies the cost of the response retrieved
                  from the dynamic metadata set by the AI Gateway filter.\n\t            #
                  The extracted value will be used to consume the rate limit budget,
                  and subsequent requests will be rate limited\n\t            # if
                  the budget is exhausted.\n\t            response:\n\t              from:
                  Metadata\n\t              metadata:\n\t                namespace:
                  io.envoy.ai_gateway\n\t                key: llm_input_token\n\t
                  \       - clientSelectors:\n\t            - headers:\n\t                -
                  name: x-user-id\n\t                  type: Distinct\n\t          limit:\n\t
                  \           requests: 10000\n\t            unit: Hour\n\t          cost:\n\t
                  \           request:\n\t              from: Number\n\t              number:
                  0\n\t            response:\n\t              from: Metadata\n\t              metadata:\n\t
                  \               namespace: io.envoy.ai_gateway\n\t                key:
                  llm_output_token\n\t        - clientSelectors:\n\t            -
                  headers:\n\t                - name: x-user-id\n\t                  type:
                  Distinct\n\t          limit:\n\t            requests: 10000\n\t
                  \           unit: Hour\n\t          cost:\n\t            request:\n\t
                  \             from: Number\n\t              number: 0\n\t            response:\n\t
                  \             from: Metadata\n\t              metadata:\n\t                namespace:
                  io.envoy.ai_gateway\n\t                key: llm_total_token\n```\n\nNote
                  that when multiple AIGatewayRoute resources are attached to the
                  same Gateway, and\ndifferent costs are configured for the same metadata
                  key, the ai-gateway will pick one of them\nto configure the metadata
                  key in the generated HTTPRoute, and ignore the rest."
                items:
                  description: LLMRequestCost configures each request cost.
                  properties:
                    cel:
                      description: "CEL is the CEL expression to calculate the cost
                        of the request.\nThe CEL expression must return a signed or
                        unsigned integer. If the\nreturn value is negative, it will
                        be error.\n\nThe expression can use the following variables:\n\n\t*
                        model: the model name extracted from the request content.
                        Type: string.\n\t* backend: the backend name in the form of
                        \"name.namespace\". Type: string.\n\t* input_tokens: the number
                        of input tokens. Type: unsigned integer.\n\t* cached_input_tokens:
                        the number of cached read input tokens. Type: unsigned integer.\n\t*
                        cache_creation_input_tokens: the number of cache creation
                        input tokens. Type: unsigned integer.\n\t* output_tokens:
                        the number of output tokens. Type: unsigned integer.\n\t*
                        total_tokens: the total number of tokens. Type: unsigned integer.\n\nFor
                        example, the following expressions are valid:\n\n\t* \"model
                        == 'llama' ?  input_tokens + output_token * 0.5 : total_tokens\"\n\t*
                        \"backend == 'foo.default' ?  input_tokens + output_tokens
                        : total_tokens\"\n\t* \"backend == 'bar.default' ?  (input_tokens
                        - cached_input_tokens) + cached_input_tokens * 0.1 + cache_creation_input_tokens
                        * 1.25 + output_tokens : total_tokens\"\n\t* \"input_tokens
                        + output_tokens + total_tokens\"\n\t* \"input_tokens * output_tokens\""
                      type: string
                    metadataKey:
                      description: MetadataKey is the key of the metadata to store
                        this cost of the request.
                      type: string
                    type:
                      description: |-
                        Type specifies the type of the request cost. The default is "OutputToken",
                        and it uses "output token" as the cost. The other types are "InputToken", "TotalToken",
                        "CachedInputToken", "CacheCreationInputToken", and "CEL".
                      enum:
                      - OutputToken
                      - InputToken
                      - CachedInputToken
                      - CacheCreationInputToken
                      - TotalToken
                      - CEL
                      type: string
                  required:
                  - metadataKey
                  - type
                  type: object
                maxItems: 36
                type: array
              parentRefs:
                description: |-
                  ParentRefs are the names of the Gateway resources this AIGatewayRoute is being attached to.
                  Currently, each reference's Kind must be Gateway.
                items:
                  description: |-
                    ParentReference identifies an API object (usually a Gateway) that can be considered
                    a parent of this resource (usually a route). There are two kinds of parent resources
                    with "Core" support:

                    * Gateway (Gateway conformance profile)
                    * Service (Mesh conformance profile, ClusterIP Services only)

                    This API may be extended in the future to support additional kinds of parent
                    resources.

                    The API object must be valid in the cluster; the Group and Kind must
                    be registered in the cluster for this reference to be valid.
                  properties:
                    group:
                      default: gateway.networking.k8s.io
                      description: |-
                        Group is the group of the referent.
                        When unspecified, "gateway.networking.k8s.io" is inferred.
                        To set the core API group (such as for a "Service" kind referent),
                        Group must be explicitly set to "" (empty string).

                        Support: Core
                      maxLength: 253
                      pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                    kind:
                      default: Gateway
                      description: |-
                        Kind is kind of the referent.

                        There are two kinds of parent resources with "Core" support:

                        * Gateway (Gateway conformance profile)
                        * Service (Mesh conformance profile, ClusterIP Services only)

                        Support for other resources is Implementation-Specific.
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                      type: string
                    name:
                      description: |-
                        Name is the name of the referent.

                        Support: Core
                      maxLength: 253
                      minLength: 1
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the referent. When unspecified, this refers
                        to the local namespace of the Route.

                        Note that there are specific rules for ParentRefs which cross namespace
                        boundaries. Cross-namespace references are only valid if they are explicitly
                        allowed by something in the namespace they are referring to. For example:
                        Gateway has the AllowedRoutes field, and ReferenceGrant provides a
                        generic way to enable any other kind of cross-namespace reference.

                        <gateway:experimental:description>
                        ParentRefs from a Route to a Service in the same namespace are "producer"
                        routes, which apply default routing rules to inbound connections from
                        any namespace to the Service.

                        ParentRefs from a Route to a Service in a different namespace are
                        "consumer" routes, and these routing rules are only applied to outbound
                        connections originating from the same namespace as the Route, for which
                        the intended destination of the connections are a Service targeted as a
                        ParentRef of the Route.
                        </gateway:experimental:description>

                        Support: Core
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    port:
                      description: |-
                        Port is the network port this Route targets. It can be interpreted
                        differently based on the type of parent resource.

                        When the parent resource is a Gateway, this targets all listeners
                        listening on the specified port that also support this kind of Route(and
                        select this Route). It's not recommended to set `Port` unless the
                        networking behaviors specified in a Route must apply to a specific port
                        as opposed to a listener(s) whose port(s) may be changed. When both Port
                        and SectionName are specified, the name and port of the selected listener
                        must match both specified values.

                        <gateway:experimental:description>
                        When the parent resource is a Service, this targets a specific port in the
                        Service spec. When both Port (experimental) and SectionName are specified,
                        the name and port of the selected port must match both specified values.
                        </gateway:experimental:description>

                        Implementations MAY choose to support other parent resources.
                        Implementations supporting other types of parent resources MUST clearly
                        document how/if Port is interpreted.

                        For the purpose of status, an attachment is considered successful as
                        long as the parent resource accepts it partially. For example, Gateway
                        listeners can restrict which Routes can attach to them by Route kind,
                        namespace, or hostname. If 1 of 2 Gateway listeners accept attachment
                        from the referencing Route, the Route MUST be considered successfully
                        attached. If no Gateway listeners accept attachment from this Route,
                        the Route MUST be considered detached from the Gateway.

                        Support: Extended
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    sectionName:
                      description: |-
                        SectionName is the name of a section within the target resource. In the
                        following resources, SectionName is interpreted as the following:

                        * Gateway: Listener name. When both Port (experimental) and SectionName
                        are specified, the name and port of the selected listener must match
                        both specified values.
                        * Service: Port name. When both Port (experimental) and SectionName
                        are specified, the name and port of the selected listener must match
                        both specified values.

                        Implementations MAY choose to support attaching Routes to other resources.
                        If that is the case, they MUST clearly document how SectionName is
                        interpreted.

                        When unspecified (empty string), this will reference the entire resource.
                        For the purpose of status, an attachment is considered successful if at
                        least one section in the parent resource accepts it. For example, Gateway
                        listeners can restrict which Routes can attach to them by Route kind,
                        namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from
                        the referencing Route, the Route MUST be considered successfully
                        attached. If no Gateway listeners accept attachment from this Route, the
                        Route MUST be considered detached from the Gateway.

                        Support: Core
                      maxLength: 253
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 16
                type: array
                x-kubernetes-validations:
                - message: only Gateway is supported
                  rule: self.all(match, match.kind == 'Gateway')
              rules:
                description: |-
                  Rules is the list of AIGatewayRouteRule that this AIGatewayRoute will match the traffic to.
                  Each rule is a subset of the HTTPRoute in the Gateway API (https://gateway-api.sigs.k8s.io/api-types/httproute/).

                  AI Gateway controller will generate a HTTPRoute based on the configuration given here with the additional
                  modifications to achieve the necessary jobs, notably inserting the AI Gateway filter responsible for
                  the transformation of the request and response, etc.

                  In the matching conditions in the AIGatewayRouteRule, `x-ai-eg-model` header is available
                  if we want to describe the routing behavior based on the model name. The model name is extracted
                  from the request content before the routing decision.

                  How multiple rules are matched is the same as the Gateway API. See for the details:
                  https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io%2fv1.HTTPRoute
                items:
                  description: AIGatewayRouteRule is a rule that defines the routing
                    behavior of the AIGatewayRoute.
                  properties:
                    backendRefs:
                      description: |-
                        BackendRefs is the list of backends that this rule will route the traffic to.
                        Each backend can have a weight that determines the traffic distribution.

                        The namespace of each backend defaults to the same namespace as the AIGatewayRoute when not specified.
                        Cross-namespace references are supported by specifying the namespace field.
                        When a namespace different than the AIGatewayRoute's namespace is specified,
                        a ReferenceGrant object is required in the referent namespace to allow that
                        namespace's owner to accept the reference.

                        BackendRefs can reference either AIServiceBackend resources (default) or InferencePool resources
                        from the Gateway API Inference Extension. When referencing InferencePool resources:
                        - Only one InferencePool backend is allowed per rule
                        - Cannot mix InferencePool with AIServiceBackend references in the same rule
                        - Fallback behavior is handled by the InferencePool's endpoint picker

                        For AIServiceBackend references, you can achieve fallback behavior by configuring multiple backends
                        combined with the BackendTrafficPolicy of Envoy Gateway.
                        Please refer to https://gateway.envoyproxy.io/docs/tasks/traffic/failover/ as well as
                        https://gateway.envoyproxy.io/docs/tasks/traffic/retry/.
                      items:
                        description: |-
                          AIGatewayRouteRuleBackendRef is a reference to a backend with a weight.
                          It can reference either an AIServiceBackend or an InferencePool resource.
                        properties:
                          bodyMutation:
                            description: |-
                              BodyMutation defines the request body mutation to be applied to this backend.
                              This allows modification of JSON fields in the request body before sending to the backend.
                              When both route-level and backend-level BodyMutation are defined,
                              route-level takes precedence over backend-level for conflicting operations.
                              This field is ignored when referencing InferencePool resources.
                            properties:
                              remove:
                                description: |-
                                  Remove the given JSON field(s) from the HTTP request body before sending to the backend.
                                  The value of Remove is a list of top-level field names to remove.

                                  Input:
                                    {
                                      "model": "gpt-4",
                                      "service_tier": "default",
                                      "internal_flag": true
                                    }

                                  Config:
                                    remove: ["service_tier", "internal_flag"]

                                  Output:
                                    {
                                      "model": "gpt-4"
                                    }
                                items:
                                  type: string
                                maxItems: 16
                                type: array
                                x-kubernetes-list-type: set
                              set:
                                description: |-
                                  Set overwrites/adds the request body with the given JSON field (name, value)
                                  before sending to the backend. Only top-level fields are currently supported.

                                  Input:
                                    {
                                      "model": "gpt-4",
                                      "service_tier": "default"
                                    }

                                  Config:
                                    set:
                                    - path: "service_tier"
                                      value: "scale"

                                  Output:
                                    {
                                      "model": "gpt-4",
                                      "service_tier": "scale"
                                    }
                                items:
                                  description: HTTPBodyField represents a JSON field
                                    name and value for body mutation
                                  properties:
                                    path:
                                      description: |-
                                        Path is the top-level field name to set in the request body.
                                        Examples: "service_tier", "max_tokens", "temperature"
                                      minLength: 1
                                      type: string
                                    value:
                                      description: |-
                                        Value is the JSON value to set at the specified field. This can be any valid JSON value:
                                        string, number, boolean, object, array, or null.
                                        The value will be parsed as JSON and inserted at the specified field.

                                        Examples:
                                          - "\"scale\"" (string)
                                          - "42" (number)
                                          - "true" (boolean)
                                          - "{\"key\": \"value\"}" (object)
                                          - "[1, 2, 3]" (array)
                                          - "null" (null)
                                      type: string
                                  required:
                                  - path
                                  - value
                                  type: object
                                maxItems: 16
                                type: array
                                x-kubernetes-list-map-keys:
                                - path
                                x-kubernetes-list-type: map
                            type: object
                          group:
                            description: |-
                              Group is the group of the backend resource.
                              When not specified, defaults to aigateway.envoyproxy.io (AIServiceBackend).
                              Currently, only "inference.networking.k8s.io" is supported for InferencePool resources.
                            maxLength: 253
                            pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                            type: string
                          headerMutation:
                            description: |-
                              HeaderMutation defines the request header mutation to be applied to this backend.
                              When both route-level and backend-level HeaderMutation are defined,
                              route-level takes precedence over backend-level for conflicting operations.
                              This field is ignored when referencing InferencePool resources.
                            properties:
                              remove:
                                description: |-
                                  Remove the given header(s) from the HTTP request before the action. The
                                  value of Remove is a list of HTTP header names. Note that the header
                                  names are case-insensitive (see
                                  https://datatracker.ietf.org/doc/html/rfc2616#section-4.2).

                                  Input:
                                    GET /foo HTTP/1.1
                                    my-header1: foo
                                    my-header2: bar
                                    my-header3: baz

                                  Config:
                                    remove: ["my-header1", "my-header3"]

                                  Output:
                                    GET /foo HTTP/1.1
                                    my-header2: bar
                                items:
                                  type: string
                                maxItems: 16
                                type: array
                                x-kubernetes-list-type: set
                              set:
                                description: |-
                                  Set overwrites/adds the request with the given header (name, value)
                                  before the action.

                                  Input:
                                    GET /foo HTTP/1.1
                                    my-header: foo

                                  Config:
                                    set:
                                    - name: "my-header"
                                      value: "bar"

                                  Output:
                                    GET /foo HTTP/1.1
                                    my-header: bar
                                items:
                                  description: HTTPHeader represents an HTTP Header
                                    name and value as defined by RFC 7230.
                                  properties:
                                    name:
                                      description: |-
                                        Name is the name of the HTTP Header to be matched. Name matching MUST be
                                        case-insensitive. (See https://tools.ietf.org/html/rfc7230#section-3.2).

                                        If multiple entries specify equivalent header names, the first entry with
                                        an equivalent name MUST be considered for a match. Subsequent entries
                                        with an equivalent header name MUST be ignored. Due to the
                                        case-insensitivity of header names, "foo" and "Foo" are considered
                                        equivalent.
                                      maxLength: 256
                                      minLength: 1
                                      pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                                      type: string
                                    value:
                                      description: Value is the value of HTTP Header
                                        to be matched.
                                      maxLength: 4096
                                      minLength: 1
                                      type: string
                                  required:
                                  - name
                                  - value
                                  type: object
                                maxItems: 16
                                type: array
                                x-kubernetes-list-map-keys:
                                - name
                                x-kubernetes-list-type: map
                            type: object
                          kind:
                            description: |-
                              Kind is the kind of the backend resource.
