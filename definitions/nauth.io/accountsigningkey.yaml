kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
    helm.sh/resource-policy: keep
  name: accountsigningkeys.nauth.io
spec:
  group: nauth.io
  names:
    kind: AccountSigningKey
    listKind: AccountSigningKeyList
    plural: accountsigningkeys
    singular: accountsigningkey
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.managementPolicy
      name: Policy
      type: string
    - jsonPath: .status.publicKey
      name: Public Key
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AccountSigningKey manages one NATS account signing-key seed in a Kubernetes Secret.
          By default NAuth manages the signing key seed: it generates a new key and stores it in
          a Secret named spec.secretName (defaulting to <resourceName>-ac-sign). The Secret is
          owned by this resource and garbage-collected when the resource is deleted.

          In observe mode (label nauth.io/management-policy=observe), NAuth only reads an existing
          Secret with the resolved name and derives the public key. Observed Secrets are not
          modified, owned, or deleted by the operator.

          An Account trusts the public key by listing this resource in Account.spec.signingKeyRefs.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AccountSigningKeySpec defines the desired state of AccountSigningKey.
            properties:
              secretName:
                description: |-
                  SecretName names the Kubernetes Secret that holds the account signing-key seed.

                  In managed mode (default), SecretName is optional and defaults to
                  <resourceName>-ac-sign; the Secret is created and owned by this AccountSigningKey.
                  In observe mode (label nauth.io/management-policy=observe), SecretName is
                  required and identifies the existing Secret to read; the operator never falls
                  back to the managed default name and never modifies the Secret.

                  Immutable.
                maxLength: 253
                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                type: string
                x-kubernetes-validations:
                - message: secretName is immutable
                  rule: self == oldSelf
            type: object
          status:
            description: AccountSigningKeyStatus defines the observed state of AccountSigningKey.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              managementPolicy:
                description: |-
                  ManagementPolicy reflects the effective management policy for this resource.
                  Empty means managed (default); "observe" means the Secret is only read.
                type: string
              observedGeneration:
                format: int64
                type: integer
              operatorVersion:
                type: string
              publicKey:
                description: PublicKey is the resolved NATS public key (A-prefixed
                  nkey) for this signing key.
                type: string
              reconcileTimestamp:
                format: date-time
                type: string
              secretName:
                description: SecretName is the resolved name of the Secret holding
                  the seed.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
