---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  labels:
    clusterctl.cluster.x-k8s.io: ""
    clusterctl.cluster.x-k8s.io/move: ""
  name: hardware.tinkerbell.org
spec:
  group: tinkerbell.org
  names:
    categories:
    - tinkerbell
    kind: Hardware
    listKind: HardwareList
    plural: hardware
    shortNames:
    - hw
    singular: hardware
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.annotations['tinkerbell.org/disabled']
      name: Disabled
      priority: 1
      type: string
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: Hardware is the Schema for the Hardware API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HardwareSpec defines the desired state of Hardware.
            properties:
              agentID:
                description: |-
                  AgentID is the unique identifier an Agent uses that is associated with this Hardware.
                  This is used to identify Hardware during the discovery and enrollment process.
                  It is typically the MAC address of the primary network interface.
                type: string
              attributes:
                description: |-
                  Attributes related to Hardware. These are attributes that are needed/used to make logical decisions
                  around builtin capabilities. For example, the Arch determines which OSIE files to server (x86_64 or aarch64).
                  The UEFI boolean us needed/used to determine options in IPMI calls.
                properties:
                  arch:
                    description: |-
                      Arch represents the Hardware's architecture type.
                      For example; x86_64 or aarch64
                    type: string
                  uefi:
                    description: UEFI reports whether the Hardware uses UEFI.
                    type: boolean
                type: object
              auto:
                description: Auto is the configuration for the automatic capabilities.
                properties:
                  enrollmentEnabled:
                    default: false
                    description: |-
                      EnrollmentEnabled enables automatic enrollment of the Hardware.
                      When set to true, auto enrollment will create Workflows for this Hardware.
                    type: boolean
                type: object
              instance:
                description: Instance describes data that is less permanent than any
                  physical attributes of the Hardware.
                properties:
                  lookupID:
                    description: |-
                      LookupID is an identifier used by the metadata service (Tootles) to route incoming requests
                      to this Hardware object. This is the value that must appear in the NoCloud seedfrom URL path
                      or the EC2 metadata endpoint path for Tootles to match the request to this Hardware.

                      This field is required when using bring-your-own DHCP (BYO DHCP), where IP-based lookup is
                      not available. The value must match whatever identifier will appear in the request URL.
                      For example, if cloud-init is configured with:

                        ds=nocloud;s=http://tootles:8080/nocloud/<lookupID>/

                      then this field must be set to the same <lookupID> value. When using DMI variable expansion
                      (e.g., __dmi.chassis-serial-number__), this field must match the machine's actual DMI value.

                      This field does not support templating. The value is stored and indexed as-is.
                    type: string
                  metadata:
                    description: |-
                      Metadata is data following the cloud-init NoCloud datasource for meta-data.

                      https://cloudinit.readthedocs.io/en/latest/reference/datasources/nocloud.html#meta-data

                      This string can be templated with values from the Hardware object by using the
                      standard Go templating format, https://pkg.go.dev/text/template.
                      Always start with ".hardware", then use dot notation to the desired key.

                      {{ .hardware.location.to.a.key.in.the.spec }}

                      For example:
                      Reference the first ssh key in the list:
                      {{ .hardware.instance.sshKeys[0] }}

                      or

                      Reference the IPv4 address of a network interface:
                      {{ (index .hardware.networkInterfaces "52:54:00:41:05:c6").ipam.ipv4.address }}
                    type: string
                  networkConfig:
                    description: |-
                      NetworkConfig is config following the cloud-init NoCloud datasource for network configuration.

                      https://cloudinit.readthedocs.io/en/latest/reference/datasources/nocloud.html#network-config

                      This string can be templated with values from the Hardware object by using the
                      standard Go templating format, https://pkg.go.dev/text/template.
                      Always start with ".hardware", then use dot notation to the desired key.

                      {{ .hardware.location.to.a.key.in.the.spec }}

                      For example:
                      Reference the first ssh key in the list:
                      {{ .hardware.instance.sshKeys[0] }}

                      or

                      Reference the IPv4 address of a network interface:
                      {{ (index .hardware.networkInterfaces "52:54:00:41:05:c6").ipam.ipv4.address }}
                    type: string
                  osie:
                    description: OSIE (Operating System Installation Environment)
                      configuration.
                    properties:
                      initrdURL:
                        description: InitrdURL, when defined, overrides the default
                          initrd URL.
                        type: string
                      isoURL:
                        description: |-
                          ISOURL, when defined, overrides is the default source URL where the Operating System Installation Environment (OSIE) ISO lives.
                          It must be a valid URL and must have a Scheme of HTTP or HTTPS.
                        type: string
                        x-kubernetes-validations:
                        - message: isoURL must be a valid http or https URL
                          rule: self == '' || (isURL(self) && url(self).getScheme()
                            in ['http','https'])
                      kernelParams:
                        description: |-
                          KernelParams, when defined, overrides the default kernel parameters passed to the kernel command line when launching the OSIE.
                          Typically they will be in the format "key=value" and align with the Linux Kernel
                          and OSIE documentation, but they can be any string.
                        items:
                          type: string
                        type: array
                      kernelURL:
                        description: KernelURL, when defined, overrides the default
                          URL to a kernel image.
                        type: string
                    type: object
                  sshKeys:
                    description: SSHKeys are public SSH keys associated with this
                      Hardware.
                    items:
                      type: string
                    type: array
                  userdata:
                    description: |-
                      Userdata is data following the cloud-init NoCloud datasource for user-data.

                      https://cloudinit.readthedocs.io/en/latest/reference/datasources/nocloud.html#user-data

                      This string can be templated with values from the Hardware object by using the
                      standard Go templating format, https://pkg.go.dev/text/template.
                      Always start with ".hardware", then use dot notation to the desired key.

                      {{ .hardware.location.to.a.key.in.the.spec }}

                      For example:
                      Reference the first ssh key in the list:
                      {{ .hardware.instance.sshKeys[0] }}

                      or

                      Reference the IPv4 address of a network interface:
                      {{ (index .hardware.networkInterfaces "52:54:00:41:05:c6").ipam.ipv4.address }}
                    type: string
                  vendordata:
                    description: |-
                      Vendordata is data following the cloud-init NoCloud datasource for vendor-data.

                      https://cloudinit.readthedocs.io/en/latest/reference/datasources/nocloud.html#vendor-data

                      This string can be templated with values from the Hardware object by using the
                      standard Go templating format, https://pkg.go.dev/text/template.
                      Always start with ".hardware", then use dot notation to the desired key.

                      {{ .hardware.location.to.a.key.in.the.spec }}

                      For example:
                      Reference the first ssh key in the list:
                      {{ .hardware.instance.sshKeys[0] }}

                      or

                      Reference the IPv4 address of a network interface:
                      {{ (index .hardware.networkInterfaces "52:54:00:41:05:c6").ipam.ipv4.address }}
                    type: string
                type: object
              networkInterfaces:
                additionalProperties:
                  description: NetworkInterface is the desired configuration for a
                    particular network interface.
                  properties:
                    dhcp:
                      description: DHCP is the DHCP configuration for this interface.
                      properties:
                        ipv4:
                          description: IPv4 is the options for serving dhcpv4 requests.
                          properties:
                            bootFileName:
                              description: |-
                                BootFileName is the boot file name. DHCP option 67.
                                Used for explicit boot file configuration, required by some network boot clients
                                like NVIDIA NVOS switches.
                                If specified, TFTPServerName must also be specified.
                              type: string
                            classlessStaticRoutes:
                              description: ClasslessStaticRoutes defines static routes
                                to be sent via DHCP option 121 (RFC 3442).
                              items:
                                description: ClasslessStaticRoute represents a classless
                                  static route for DHCP option 121 (RFC 3442).
                                properties:
                                  destinationDescriptor:
                                    description: |-
                                      DestinationDescriptor is the network address and prefix length.
                                      The format is "network/prefixlength", e.g., "192.168.1.0/24" or "10.0.0.0/8".
                                    pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/(3[0-2]|[12]?[0-9])$
                                    type: string
                                  router:
                                    description: Router is the IP address of the router
                                      for this route.
                                    pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
                                    type: string
                                required:
                                - destinationDescriptor
                                - router
                                type: object
                              type: array
                            disabled:
                              description: |-
                                Disabled indicates that DHCPv4 should not be served for this interface.
                                When true, no DHCPv4 offer or ack will be sent for this MAC address.
                              type: boolean
                            domainName:
                              description: DomainName to be written. DHCP option 15.
                              type: string
                            domainSearchList:
                              description: DomainSearchList defines DNS search suffixes
                                via DHCP option 119 (RFC 3397).
                              items:
                                type: string
                              maxItems: 32
                              type: array
                            hostname:
                              description: Hostname is DHCP option 12.
                              pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\\-]*[a-zA-Z0-9])$
                              type: string
                            leaseTimeSeconds:
                              default: 86400
                              description: |-
                                LeaseTimeSeconds to serve. 24h default. Maximum equates to max uint32 as defined by RFC 2132
                                § 9.2 (https://www.rfc-editor.org/rfc/rfc2132.html#section-9.2). DHCP option 51.
                              format: int64
                              maximum: 4294967295
                              minimum: 0
                              type: integer
                            nameservers:
                              description: Nameservers corresponding to DHCPv4 option
                                6.
                              items:
                                description: Nameserver is an IPv4 address, IPv6 address,
                                  or hostname.
                                maxLength: 253
                                pattern: ^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$|^(([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))$
                                type: string
                              maxItems: 10
                              type: array
                            ntpServers:
                              description: NTPServers corresponding to DHCPv4 option
                                42 (RFC 2132 §8.3).
                              items:
                                description: Timeserver is an IPv4 address, IPv6 address,
                                  or hostname.
                                maxLength: 253
                                pattern: ^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$|^(([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))$
                                type: string
                              maxItems: 10
                              type: array
                            tftpServerName:
                              description: |-
                                TFTPServerName is the TFTP server name or IP address. DHCP option 66.
                                Used for explicit TFTP server configuration, required by some network boot clients
                                like NVIDIA NVOS switches.
                                If specified, BootFileName must also be specified.
                              type: string
                            vlanID:
                              description: VLANID is a VLAN ID between 0 and 4096.
                                DHCP option 43 suboption 116.
                              pattern: ^(([0-9][0-9]{0,2}|[1-3][0-9][0-9][0-9]|40([0-8][0-9]|9[0-6]))(,[1-9][0-9]{0,2}|[1-3][0-9][0-9][0-9]|40([0-8][0-9]|9[0-6]))*)$
                              type: string
                          type: object
                          x-kubernetes-validations:
                          - message: TFTPServerName and BootFileName must both be
                              specified or both be empty
                            rule: (has(self.tftpServerName) && self.tftpServerName
                              != "") == (has(self.bootFileName) && self.bootFileName
                              != "")
                        ipv6:
                          description: IPv6 is the options for serving dhcpv6 requests.
                          properties:
                            bootFileParams:
                              description: BootFileParams are parameters for the boot
                                file. DHCPv6 option 60 (RFC 5970).
                              items:
                                type: string
                              type: array
                            bootFileURL:
                              description: |-
                                BootFileURL is the URL for the boot file. DHCPv6 option 59 (RFC 5970).
                                For example, "tftp://[2001:db8::1]/bootx64.efi".
                              type: string
                            disabled:
                              description: |-
                                Disabled indicates that DHCPv6 should not be served for this interface.
                                When true, no DHCPv6 responses will be sent for this MAC address.
                              type: boolean
                            domainSearchList:
                              description: DomainSearchList to serve via DHCPv6 option
                                24 (RFC 3646).
                              items:
                                type: string
                              maxItems: 32
                              type: array
                            informationRefreshTime:
                              description: |-
                                InformationRefreshTime is the upper bound in seconds for how long a client should wait
                                before refreshing information retrieved from DHCPv6. DHCPv6 option 32 (RFC 8415 §21.23).
                                Included in replies to Information-Request messages.
                              format: int64
                              minimum: 0
                              type: integer
                            nameservers:
                              description: Nameservers to serve via DHCPv6 option
                                23 (RFC 3646). Must be valid IPv6 addresses.
                              items:
                                description: Nameserver is an IPv4 address, IPv6 address,
                                  or hostname.
                                maxLength: 253
                                pattern: ^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$|^(([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))$
                                type: string
                              maxItems: 10
                              type: array
                            ntpServers:
                              description: NTPServers to serve via DHCPv6 option 56
                                (RFC 5908). Must be valid IPv6 addresses.
                              items:
                                description: Timeserver is an IPv4 address, IPv6 address,
                                  or hostname.
                                maxLength: 253
                                pattern: ^(([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]*[a-zA-Z0-9])\.)*([A-Za-z0-9]|[A-Za-z0-9][A-Za-z0-9\-]*[A-Za-z0-9])$|^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])$|^(([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))$
                                type: string
                              maxItems: 10
                              type: array
                            preferredLifetime:
                              description: |-
                                PreferredLifetime is the preferred lifetime in seconds for IPv6 addresses
                                assigned via IA_NA. Included in replies to Solicit/Request messages.
                              format: int64
                              minimum: 0
                              type: integer
                            validLifetime:
                              description: |-
                                ValidLifetime is the valid lifetime in seconds for IPv6 addresses
                                assigned via IA_NA. Included in replies to Solicit/Request messages.
                              format: int64
                              minimum: 0
                              type: integer
                          type: object
                      type: object
                    ipam:
                      description: IPAM is the IP address management for this interface.
                      properties:
                        ipv4:
                          description: IPv4 is the IPv4 address and associated network
                            info.
                          properties:
                            address:
                              description: Address is the unique network address.
                              maxLength: 45
                              type: string
                            gateway:
                              description: Gateway is the default gateway address
                                to serve.
                              maxLength: 45
                              type: string
                            prefix:
                              description: Prefix is the subnet length.
                              maxLength: 3
                              type: string
                          type: object
                        ipv6:
                          description: IPv6 is the IPv6 address and associated network
                            info.
                          properties:
                            address:
                              description: Address is the unique network address.
                              maxLength: 45
                              type: string
                            gateway:
                              description: Gateway is the default gateway address
                                to serve.
                              maxLength: 45
                              type: string
                            prefix:
                              description: Prefix is the subnet length.
                              maxLength: 3
                              type: string
                          type: object
                      type: object
                    netboot:
                      description: Netboot configuration.
                      properties:
                        disabled:
                          description: |-
                            Disabled indicates that netbooting should not be enabled for this interface.
                            When true, no netboot options will be provided in DHCP and iPXE script requests will return 404.
                          type: boolean
                        ipxe:
                          description: IPXE configuration.
                          properties:
                            binary:
                              description: |-
                                Binary, when defined, overrides the default mapping of architecture to iPXE binary.
                                The following binary names are supported:
                                - undionly.kpxe
                                - ipxe.efi
                                - snp-arm64.efi
                                - snp-x86_64.efi
                                See the iPXE Architecture Mapping documentation for more details.
                              type: string
                            script:
                              description: |-
                                Script, when defined, overrides the Tinkerbell iPXE script.
                                Must start with: #!ipxe
                              type: string
                              x-kubernetes-validations:
                              - message: script must start with '#!ipxe'
                                rule: self == '' || self.startsWith('#!ipxe')
                            url:
                              description: |-
                                URL, when defined, overrides the Tinkerbell iPXE script and uses iPXE's chainloading capabilities
                                to download and run the script at the defined URL.
                              type: string
                          type: object
                          x-kubernetes-validations:
                          - message: script and url are mutually exclusive
                            rule: '!(has(self.script) && self.script != "" && has(self.url)
                              && self.url != "")'
                        pxelinux:
                          description: PXELINUX configuration.
                          properties:
                            config:
                              description: |-
                                Config, when defined, overrides the default PXELinux config to use for generating the pxelinux.cfg file.
                                It should be in "extlinux" format, as per u-boot's distroboot and bootstd documentation.
                              type: string
                          type: object
                        rpi:
                          description: RPI (Raspberry Pi) configuration.
                          properties:
                            configTxt:
                              description: |-
                                ConfigTxt, when defined, overrides the default Raspberry Pi config.txt file content.
                                When not specified, a default config.txt will be used.
                              type: string
                            firmwarePath:
                              description: |-
                                FirmwarePath, when defined, overrides the default path to firmware files.
                                This must be coordinated with where Tinkerbell serves Raspberry Pi firmware files. See the Tinkerbell docs for details.

                                This is an internal URI rewrite. The Raspberry Pi will always request files from the TFTPPrefix.
                                This field defines a common backend location for the generic firmware files, which will be used for all other files and binaries.
                                A Raspberry Pi will still request all files from the TFTPPrefix, but Tinkerbell will serve files from FirmwarePath when the request path starts with the Pi's serial number.
                                For example, if FirmwarePath is set to "captainos/rpi-firmware", then a request for "<PiSerialNum>/start4.elf" will be served from "rpi-firmware/start4.elf" in Tinkerbell's filesystem.
                                There are 3 main purposes for this:
                                1. avoid having to duplicate firmware files for each Raspberry Pi.
                                2. allow each Hardware object to specify a different set of firmware files if needed.
                                3. decouple generic firmware files from the, optionally defined, hardware specific config.txt and cmdline.txt files.
                              type: string
                            serialNum:
                              description: |-
                                SerialNum is the Raspberry Pi's serial number.
                                This can be the full serial number or just the last 8 characters.
                                To use any of the fields in the RPI struct, SerialNum must be specified to allow Tinkerbell to associate this configuration with the correct Raspberry Pi.
                              type: string
                          required:
                          - serialNum
